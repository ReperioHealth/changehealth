version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9001:3001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "9000:5173"
    volumes:
      - ./frontend/src:/app/src
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
